<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Isac-like RPG</title>
    <!-- Mobile App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Custom CSS for DOM Overlay -->
    <link rel="stylesheet" href="src/index.css?v=2.1">
</head>

<body>
    <div id="app-container">
        <!-- Phaser renders here (Top-Left) -->
        <div id="game-container"></div>

        <!-- Inventory Sidebar (Top-Right) -->
        <div id="sidebar-right">
            <div class="panel-title">Inventory</div>

            <div class="inventory-section">
                <div class="section-title">Materials</div>
                <div id="material-list" class="inventory-grid">
                    <!-- Materials go here -->
                </div>
            </div>

            <div class="inventory-section">
                <div class="section-title">Gear</div>
                <div id="gear-list" class="inventory-grid">
                    <!-- Equipment goes here -->
                </div>
            </div>
        </div>

        <!-- Dynamic Chat Channels Container (Bottom-Left) -->
        <div id="chat-container"></div>

        <!-- Mobile HUD Layer -->
        <div id="mobile-hud">
            <div id="hud-top">
                <div class="hud-stat"><img src="assets/emojis/1fa99.svg" alt="Gold"> <span id="hud-gold">0</span></div>
                <div class="hud-stat"><img src="assets/emojis/1f48e.svg" alt="Gem"> <span id="hud-gem">0</span></div>
                <div id="hud-menu-btns">
                    <button id="btn-fullscreen" title="Fullscreen">⛶</button>
                    <button id="btn-inventory" title="Inventory">🎒</button>
                    <button id="btn-party" title="Party">⚔️</button>
                </div>
            </div>

            <div id="hud-bottom">
                <div id="portrait-bar">
                    <!-- Portraits will be injected here -->
                </div>
            </div>
        </div>

        <!-- Popups (Hidden by default) -->
        <div id="popup-overlay" style="display: none;">
            <div id="popup-content">
                <button id="popup-close">✕</button>
                <div id="popup-inner"></div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js?v=2.1"></script>
</body>

</html>
