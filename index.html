<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Isac-like RPG</title>
    <!-- Mobile App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Retro Pixel Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Custom CSS for DOM Overlay -->
  <script type="module" crossorigin src="./assets/index-SwMJFW6G.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-BqIGk_JN.css">
</head>

<body>
    <!-- Hidden SVG Filters -->
    <svg class="hd2d-film-grain-filter" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="hd2d-noise" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="linearRGB">
                <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"
                    result="noiseOut" />
                <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise" />
                <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend" />
                <feComposite in="blend" in2="SourceGraphic" operator="in" />
            </filter>

        </defs>
    </svg>

    <div id="app-container">
        <!-- Phaser renders here (Top-Left) -->
        <div id="game-container">
            <!-- HD-2D Visual Enhancements (Octopath Traveler Style) -->
            <div class="hd2d-fx-layer vignette"></div>
            <div class="hd2d-fx-layer tilt-shift">
                <div class="tilt-shift-top"></div>
                <div class="tilt-shift-bottom"></div>
            </div>
            <div class="hd2d-fx-layer soft-bloom"></div>
            <div class="hd2d-fx-layer color-grading"></div>
            <div class="hd2d-fx-layer scanlines"></div>
            <!-- Film Grain: SVG feTurbulence noise (Octopath signature texture) -->
            <div class="hd2d-fx-layer film-grain"></div>
            <!-- Chromatic Aberration: subtle RGB channel split -->
            <div class="hd2d-fx-layer chromatic-aberration">
                <div class="hd2d-fx-layer chromatic-r"></div>
                <div class="hd2d-fx-layer chromatic-b"></div>
            </div>
        </div>

        <!-- Inventory Sidebar (Top-Right) -->
        <div id="sidebar-right">
            <div class="panel-title" style="display: none;">Inventory</div>

            <div class="inventory-tabs">
                <button class="tab-btn active" id="tab-materials">🎒 이모지</button>
                <button class="tab-btn" id="tab-gear">⚔️ 장비</button>
            </div>

            <div id="section-materials" class="inventory-section">
                <div class="emoji-filter-bar">
                    <button class="filter-btn active" data-filter="ALL">ALL</button>
                    <button class="filter-btn" data-filter="ACTIVE">A</button>
                    <button class="filter-btn" data-filter="TACTICAL">B</button>
                    <button class="filter-btn" data-filter="CLASS">C</button>
                    <button class="filter-btn" data-filter="TRANSFORMATION">D</button>
                </div>
                <div id="material-list" class="inventory-grid">
                    <!-- Materials go here -->
                </div>
            </div>

            <div id="section-gear" class="inventory-section" style="display: none;">
                <div class="section-title" style="display: none;">⚔️ Gear</div>
                <div id="gear-list" class="inventory-grid">
                    <!-- Equipment goes here -->
                </div>
            </div>

            <!-- Item Detail Panel -->
            <div id="item-detail-panel" style="display: none;">
                <div class="detail-header">
                    <h3 id="detail-name">Item Name</h3>
                    <span id="detail-type">ITEM</span>
                </div>
                <div class="detail-divider"></div>
                <div id="detail-description">Item description goes here.</div>
                <button id="btn-equip-item" class="equip-btn">장착</button>
            </div>
        </div>

        <!-- Dynamic Chat Channels Container (Bottom-Left) -->
        <div id="chat-container"></div>

        <!-- Mobile HUD Layer -->
        <div id="mobile-hud">
            <div id="hud-header">
                <div id="hud-top">
                    <div class="hud-stat"><img src="assets/emojis/1fa99.svg" alt="Gold"> <span id="hud-gold">0</span>
                    </div>
                    <div class="hud-stat"><img src="assets/emojis/1f48e.svg" alt="Gem"> <span id="hud-gem">0</span>
                    </div>
                    <div id="hud-menu-btns">
                        <button id="btn-fullscreen" title="Fullscreen">⛶</button>
                        <button id="btn-inventory" title="Inventory">🎒</button>
                        <button id="btn-party" title="Party">⚔️</button>
                        <button id="btn-settings" title="Settings">⚙️</button>
                        <button id="btn-exit" title="Exit"
                            style="background: rgba(255, 50, 50, 0.6); display: none;">✕</button>
                    </div>
                </div>

                <div id="hud-scene-nav">
                    <button class="nav-btn" data-scene="TerritoryScene">영지</button>
                    <button class="nav-btn" data-scene="GachaScene">뽑기</button>
                    <button class="nav-btn" data-popup="party">편성</button>
                    <div class="nav-dropdown-wrapper">
                        <button class="nav-btn" id="btn-dungeon-main">던전</button>
                        <div class="nav-dropdown" id="dungeon-dropdown">
                            <button class="nav-dropdown-item" data-scene="DungeonScene"
                                data-dungeon="CURSED_FOREST">저주받은 숲</button>
                            <button class="nav-dropdown-item" data-scene="DungeonScene"
                                data-dungeon="UNDEAD_GRAVEYARD">언데드 묘지</button>
                        </div>
                    </div>
                    <button class="nav-btn" data-scene="ArenaScene">아레나</button>
                    <button class="nav-btn" data-scene="RaidScene">레이드</button>
                </div>

                <!-- NPC HUD (Left-Top during Combat) -->
                <div id="npc-hud" style="display: none;">
                    <div class="npc-hud-card">
                        <img id="npc-hud-icon" src="" alt="NPC">
                        <div class="npc-hud-stacks" id="npc-hud-stacks">0</div>
                    </div>
                </div>

                <!-- Messiah HUD (Right-Top during Combat) -->
                <div id="messiah-hud" style="display: none;">
                    <div class="messiah-hud-card">
                        <div id="messiah-hud-icon"
                            style="font-size: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.8);">👆</div>
                        <div class="messiah-hud-stacks" id="messiah-hud-stacks">0/10</div>
                        <div class="messiah-cooldown-bar-bg"
                            style="width: 100%; height: 3px; background: rgba(0,0,0,0.5); border-radius: 2px; margin-top: 2px; overflow: hidden;">
                            <div class="messiah-cooldown-bar-fill" id="messiah-cooldown-fill"
                                style="width: 0%; height: 100%; background: #fbbf24; transition: width 0.1s linear;">
                            </div>
                        </div>
                        <button id="messiah-auto-btn" class="messiah-auto-btn" style="margin-top: 2px;">AUTO</button>
                    </div>
                </div>
            </div>

            <div id="hud-bottom">
                <div id="portrait-bar">
                    <!-- Portraits will be injected here -->
                </div>
            </div>
        </div>

        <!-- Round Display (Isolated from other HUD elements) -->
        <div id="hud-round-display" class="hidden">
            <div class="round-display-bg"></div>
            <span id="hud-round-text">ROUND 1</span>
        </div>

        <!-- Popups (Hidden by default) -->
        <div id="popup-overlay" style="display: none;">
            <div id="popup-content">
                <button id="popup-close">✕</button>
                <div id="popup-inner"></div>
            </div>
        </div>

        <!-- Custom Confirmation Modal -->
        <div id="confirm-overlay" style="display: none;">
            <div id="confirm-content">
                <div id="confirm-message">전투가 진행 중입니다. 정말로 나가시겠습니까?</div>
                <div class="confirm-btns">
                    <button id="btn-confirm-yes" class="confirm-btn yes">확인</button>
                    <button id="btn-confirm-no" class="confirm-btn no">취소</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
