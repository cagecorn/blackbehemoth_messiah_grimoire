<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isac-like RPG</title>
    <!-- Custom CSS for DOM Overlay -->
    <link rel="stylesheet" href="/src/index.css">
</head>

<body>
    <div id="app-container">
        <!-- Phaser renders here (Top-Left) -->
        <div id="game-container"></div>

        <!-- Inventory Sidebar (Top-Right) -->
        <div id="sidebar-right">
            <div class="panel-title">Inventory</div>
            
            <div class="inventory-section">
                <div class="section-title">Materials</div>
                <div id="material-list" class="inventory-grid">
                    <!-- Materials go here -->
                </div>
            </div>

            <div class="inventory-section">
                <div class="section-title">Gear</div>
                <div id="gear-list" class="inventory-grid">
                    <!-- Equipment goes here -->
                </div>
            </div>
        </div>

        <!-- Dynamic Chat Channels Container (Bottom-Left) -->
        <div id="chat-container"></div>

        <!-- Minimap Placeholder (Bottom-Right) -->
        <div id="minimap-container">
            <div class="panel-title">Minimap</div>
            <div class="minimap-content">
                <!-- Map visualization will go here -->
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
