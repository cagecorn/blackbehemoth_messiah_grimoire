name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # main 브랜치에 코드가 올라올 때만 실행됩니다.

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 빌드된 파일이 있는 폴더
          branch: gh-pages # 배포될 브랜치 이름
